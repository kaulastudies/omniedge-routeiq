name: Publish RouteIQ v1.7 Accuracy First

on:
  push:
    branches:
      - track1-v17-accuracy-first
    paths:
      - "track1-v17-agent/**"
      - ".github/workflows/publish-track1-v17.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-routeiq-v17-accuracy-first
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout candidate branch
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish linux/amd64 candidate
        uses: docker/build-push-action@v6
        with:
          context: ./track1-v17-agent
          file: ./track1-v17-agent/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ghcr.io/${{ github.repository_owner }}/omniedge-routeiq-track1:c-v17-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
