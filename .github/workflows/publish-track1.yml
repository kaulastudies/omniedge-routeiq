name: Publish Track 1 Container

on:
  push:
    branches:
      - track1-scoring-agent
    paths:
      - "track1-agent/**"
      - ".github/workflows/publish-track1.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: ./track1-agent
          file: ./track1-agent/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/kaulastudies/omniedge-routeiq-track1:v0.4-resilient-routing
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=OmniEdge RouteIQ AMD ACT II Track 1 scoring agent
