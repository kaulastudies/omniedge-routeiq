name: Publish Track 1 Conservative v0.8

on:
  workflow_dispatch:
  push:
    branches:
      - track1-final-conservative-v08
    paths:
      - "track1-final-agent/**"
      - ".github/workflows/publish-track1-final-v08.yml"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Track 1 image
        uses: docker/build-push-action@v6
        with:
          context: ./track1-final-agent
          file: ./track1-final-agent/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ghcr.io/kaulastudies/omniedge-routeiq-track1:v0.8-conservative
