name: Publish RouteIQ v1.7.3 Safe Compression
on:
  workflow_dispatch:
  push:
    branches:
      - "track1-v172-compact-hybrid-20260712-155120"
    paths:
      - "track1-v173-agent/**"
      - ".github/workflows/publish-track1-v173.yml"
permissions:
  contents: read
  packages: write
concurrency:
  group: publish-routeiq-v173-safe-compression
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./track1-v173-agent
          file: ./track1-v173-agent/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ghcr.io/${{ github.repository_owner }}/omniedge-routeiq-track1:c-v173-${{ github.sha }}
