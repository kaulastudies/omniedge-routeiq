name: Publish Track 1 Local Hybrid

on:
  push:
    branches:
      - track1-local-first-v06
    paths:
      - "track1-local-agent/**"
      - ".github/workflows/publish-track1-local.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Track 1 image
        uses: docker/build-push-action@v6
        with:
          context: ./track1-local-agent
          file: ./track1-local-agent/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ghcr.io/kaulastudies/omniedge-routeiq-track1:v0.7-local-gemma-hybrid
